name: Auto Price Update

on:
  schedule:
    - cron: '0 9 * * 6'   # Every Saturday at 9am UTC (1 hour after price-check issue)
  workflow_dispatch:        # Manual trigger from Actions tab

jobs:
  update-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic

      - name: Run price updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/auto_price_update.py

      - name: Commit and push if prices changed
        run: |
          git config user.name "TechForDad Price Bot"
          git config user.email "techfordad7@gmail.com"
          git add blog/ scripts/products.json
          if git diff --staged --quiet; then
            echo "no_changes=true" >> $GITHUB_ENV
          else
            git commit -m "Auto-update product prices $(date +'%Y-%m-%d')"
            git push
            echo "no_changes=false" >> $GITHUB_ENV
          fi

      - name: Create summary issue for changed prices
        if: env.no_changes == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, subprocess, os
          data = json.load(open('/tmp/price_changes.json'))
          changes = data['changes']
          if not changes:
              raise SystemExit(0)

          lines = [
              f"## Auto Price Update — {data['date']}",
              "",
              f"**{len(changes)} price(s)** were automatically updated and pushed live.",
              "",
              "| Product | Article | Old Price | New Price |",
              "|---------|---------|-----------|-----------|",
          ]
          for c in changes:
              lines.append(f"| {c['product']} | {c['article']} | {c['old']} | **{c['new']}** |")
          lines += [
              "",
              "> If any price looks wrong (e.g. picked up the wrong tier), "
              "edit `scripts/products.json` and the article HTML manually and push a fix.",
              "",
              "_Generated by the Auto Price Update workflow._",
          ]

          body = "\n".join(lines)
          with open('/tmp/issue_body.md', 'w') as f:
              f.write(body)

          subprocess.run([
              'gh', 'issue', 'create',
              '--title', f"Auto Price Update — {data['date']}",
              '--body-file', '/tmp/issue_body.md',
              '--label', 'price-check',
          ], check=True)
          EOF
